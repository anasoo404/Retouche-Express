<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retouche Express | Contact</title>
  <meta name="description" content="Contact test Retouche Express." />
  <link rel="icon" type="image/png" href="Tailoring%20logo%20with%20elegant%20script.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="logo" href="index.html" aria-label="Retouche Express - Accueil">
        <img src="Tailoring%20logo%20with%20elegant%20script.png" alt="Logo Retouche Express" />
      </a>
      <button class="menu-toggle" aria-label="Ouvrir le menu">☰</button>
      <nav class="site-nav">
        <a href="index.html">Accueil</a>
        <a href="services.html">Services</a>
        <a class="active" href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="section reveal">
      <div class="container contact-grid">
        <div>
          <h1>Contact</h1>
          <p class="lead">Infos fictives pour test de prototype.</p>
          <ul class="contact-list">
            <li>Téléphone : +33 6 12 34 56 78</li>
            <li>Email : contact@retouche-express.test</li>
            <li>Adresse : 18 Rue de la Couture, 75000 Paris</li>
          </ul>
        </div>

        <form class="contact-form" id="contactForm">
          <label>
            Nom
            <input type="text" name="name" placeholder="Votre nom" required />
          </label>
          <label>
            Email
            <input type="email" name="email" placeholder="vous@email.com" required />
          </label>
          <label>
            Message
            <textarea name="message" rows="5" placeholder="Votre demande" required></textarea>
          </label>
          <button class="btn btn-primary" type="submit">Envoyer (test)</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-wrap">
      <p>© 2026 Retouche Express</p>
      <p>Site prototype de démonstration</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
